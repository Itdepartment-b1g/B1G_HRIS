# Supabase project config
# See: https://supabase.com/docs/guides/functions/function-configuration
#
# IMPORTANT: These settings apply only after you deploy from this repo, e.g.:
#   supabase functions deploy create-user --project-ref <your-ref>
# If you still see gateway 401 "Invalid JWT", the hosted function may still have
# JWT verification ON — redeploy with this file, or turn off "Verify JWT" for
# that function in the Supabase Dashboard (Edge Functions → function → details).

# Disable gateway JWT verification for admin Edge Functions.
# These functions perform their own JWT validation via verifyUserJwt + requireAdmin.
# This bypasses Supabase gateway validation which can cause 401 with valid tokens
# (e.g. JWT key rotation, audience/issuer quirks).
[functions.update-user-profile]
verify_jwt = false

[functions.create-user]
verify_jwt = false

[functions.delete-user]
verify_jwt = false

[functions.reset-password]
verify_jwt = false

[functions.seed-database]
verify_jwt = false

[functions.seed-attendance]
verify_jwt = false
